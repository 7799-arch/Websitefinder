<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Student Website</title>
        <style>
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                text-align: center;
                margin: 0px;
            }
            .container {
                background-color: aliceblue;
                font-family:sans-serif;
                border-radius: 10px;
                padding:10px;
                width: 400px;
            }
            input {
                width:85%;
                border-radius: 5px;
                border: none;
                margin: 10px;
                padding: 10px;
                
            }
            h1 {
                color: rgb(32, 32, 32);
                font-family: sans-serif;
            }
            .accordion {
                background-color: aliceblue;
                color:black;
                cursor: pointer;
                padding: 2px;
                width: 100%;
                border: none;
                outline: none;
                transition: 0.4s;
            }
            .accordion:after {
                content: '\25BE';
                float: right;
                margin-left: 5px;
            }
            .active:after {
                content: '\25B4';
            }
            .panel {
                font-size: 80%;
                padding: 0 2px;
                background-color: aliceblue;
                overflow: hidden;
                max-height: 0;
                transition: max-height 0.3s ease-out;
            }
            button {
                background-color: rgb(101, 117, 170);
                color: rgb(255, 255, 255);
                padding: 10px;
                border-radius: 5px;
                border: none;
                cursor: pointer;
            }

            img {
                width:150px;
                height:150px;
                margin:10px;
            }

        </style>
    </head>

        <h1>Student Website</h1>

        <div class="container" style="color:rgb(32, 32, 32)"><b>Enter your website number</b>
            <button id="acc" class="accordion"><i>How to access my number?</i></button>
            <div class="panel">
                <p>Your website would have been allocated a number (1-36), whatever number you were assigned to, it will be the same in the drive</p>
            </div>
            <input type="number" id="userNumber" min="1" max="35" placeholder="Enter your number">
            <button onclick="enterWeb()"><b>Enter website</b></button>
        </div>
        <script>
            //accordian
            
            const acc = document.getElementsByClassName("accordion");
                
            for (let i= 0; i < acc.length; i++) {
                acc[i].addEventListener("click", function() {
                    this.classList.toggle("active");
                    const panel = this.nextElementSibling;
                        
                    if (panel.style.maxHeight) {
                        panel.style.maxHeight = null;
                    } else {
                        panel.style.maxHeight = panel.scrollHeight + "px";
                    }
                });
            }
            
            //website enter
            function enterWeb() {
                let studentNumber = document.getElementById("userNumber").value.trim()
                window.location.href = studentNumber + "/home.html";
            }
        </script>
    </body>
